<!doctype html>
<html>

<head>
  <title>test 1</title>
  <style>
    #content {
      display: flex;
      flex-direction: column;
      /* align-items: center; */
      min-width: 60vw;
      /* min-width: 10px; */
      background-color: lightpink;
      position:absolute;
      left: 20%;
      top: 5%;
      min-height: 80vh;
      padding: 1vw;
    }
    @media(max-width: 800px) {
      #content {
        width: 90vw;
        left: 5vw;
        font-size: 1.5rem;
      }
    }
    body{
      /* text-align: center; */
      align-items: center;

      background-image: url("img/bg.jpg");
      background-attachment: fixed;
      background-size: 640px 360px;
    }
    textarea{ 
      width: 98%;

      /* height: fit-content; */

    form{
      width: 100%

      width: 100%
    }

      width: 20%

</head>

<body onload="loadContent()">
  <script>
    function shuffle(array) {
      let currentIndex = array.length;

      // While there remain elements to shuffle...
      while (currentIndex != 0) {

        // Pick a remaining element...
        let randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;

        // And swap it with the current element.
        [array[currentIndex], array[randomIndex]] = [
          array[randomIndex], array[currentIndex]];
      }
    }
    const tytuly = ["tytul 1", "tytul 2", "tytul 3", "tytul 4", "tytul 5"];
    pierwszeZdania={
      "mezczyzna":"Szanowny Panie,",
      "kobieta":"Szanowna Panii,"
    }
    const akapity1 = ["pierwszy akapit 1","pierwszy akapit 2","pierwszy akapit 3","pierwszy akapit 4","pierwszy akapit 5"]
    const akapity2 = ["drugi akapit 1","drugi akapit 2","drugi akapit 3","drugi akapit 4","drugi akapit 5"]
    const podpisPoczatek = "\nZ poważaniem,\n"
    email_dict={
      "grupa_1":{
        "mezczyzna":['grupa1email1mezczyzna@gmail.com','grupa1email2mezczyzna@gmail.com','grupa1email3mezczyzna@gmail.com'],
        "kobieta":['grupa1email1kobieta@gmail.com','grupa1email2kobieta@gmail.com','grupa1email3kobieta@gmail.com']
      },
      "grupa_2":{
        "mezczyzna":['grupa2email1mezczyzna@gmail.com','grupa2email2mezczyzna@gmail.com','grupa2email3@mezczyznagmail.com'],
        "kobieta":['grupa2email1kobieta@gmail.com','grupa2email2kobieta@gmail.com','grupa2email3kobieta@gmail.com']
      },
      "grupa_3":{
        "mezczyzna":['grupa3email1mezczyzna@gmail.com','grupa3email2mezczyzna@gmail.com'],
        "kobieta":['grupa3email1kobieta@gmail.com','grupa3email2kobieta@gmail.com']
      }
    }
    var trescMaila = "";
    lenAkapity1 = akapity1.length;
    lenAkapity2 = akapity2.length;
    trescMaila += akapity1[Math.floor(Math.random() * lenAkapity1)] + "\n"
    trescMaila += akapity2[Math.floor(Math.random() * lenAkapity2)] + "\n"
    tytul = tytuly[Math.floor(Math.random() * tytuly.length)];
    function loadContent() {
      pierwszeZdanie = pierwszeZdania[document.getElementById('funkcja').value]+"\n"
      groupChoiceStr = ""
      Object.keys(email_dict).forEach(function(key){
        groupChoiceStr += "<input type=\"checkbox\" id=\""+key+"\" checked>"+key.replace("_"," ")
      })
      document.getElementById("groupChoice").innerHTML = groupChoiceStr;
      podpis = podpisPoczatek + document.getElementById("podpisMaila").value
      document.getElementById("trescMaila").innerHTML = pierwszeZdanie + trescMaila + podpis;
      document.getElementById("tytulMaila").value = tytul;
    }
    function getEmailStr(){
      emails = []
      funkcja = document.getElementById("funkcja").value
      Object.keys(email_dict).forEach(function(key){
        if(document.getElementById(key).checked){
          emails.push.apply(emails, email_dict[key][funkcja])
        }
      })
      if(emails.length == 0){
        Object.keys(email_dict).forEach(function(key){
          emails.push.apply(emails, email_dict[key][funkcja])
        })
      }
      console.log(emails)
      shuffle(emails)
      console.log(emails)
      returnEmailsNum = Math.min(emails.length, 3)
      console.log("returnEmailsNum: "+returnEmailsNum)
      emailStr = ""
      for (let i = 0; i < returnEmailsNum; i++){
        emailStr += emails[i]
        if(i+1<returnEmailsNum){
          emailStr+= ", "
        }
      }
      return emailStr
    }
    function sendFunction() {
      emailStr = getEmailStr()
      tytul = encodeURIComponent(document.getElementById("tytulMaila").value);
      tekst = encodeURIComponent(document.getElementById("trescMaila").innerHTML);
      window.open('mailto:'+emailStr+'?subject=' + tytul + '&body=' + tekst);
      randomizeContent()
    }
    function changeMailContent(){
      pierwszeZdanie = pierwszeZdania[document.getElementById('funkcja').value]+"\n";
      podpis = podpisPoczatek + document.getElementById("podpisMaila").value;
      document.getElementById("trescMaila").innerHTML = pierwszeZdanie + trescMaila + podpis;
    }
    function randomizeContent(){
      pierwszeZdanie = pierwszeZdania[document.getElementById('funkcja').value]+"\n";
      podpis = podpisPoczatek + document.getElementById("podpisMaila").value;
      trescMaila = "";
      trescMaila += akapity1[Math.floor(Math.random() * lenAkapity1)] + "\n"
      trescMaila += akapity2[Math.floor(Math.random() * lenAkapity2)] + "\n"
      document.getElementById("trescMaila").innerHTML = pierwszeZdanie + trescMaila + podpis;
    }
  </script>

  <div id="content">
    <form autocomplete="off">
    <h2>wyslij do mnie maila</h2>

    Tytuł maila:<input type="text" name="tytul" id="tytulMaila" class="formInput">
    </form>
    Imię do podpisu :<input type="text" name="podpis" id="podpisMaila" class="formInput" oninput="changeMailContent()">
    <div id="divGrupa">
      Wyślij do osób należących do grup (odznacz te do których nie chcesz wysyłać):<br>
      <div id="groupChoice"></div>
      Które są:
      <select id="funkcja" onchange="changeMailContent()">
        <option value="mezczyzna">Mężczyzną</option>
        <option value="kobieta">Kobietą</option>
      </select>
    </div>
    <button onclick="sendFunction()">wyślij</button><br>
    <form autocomplete="off">
    Treść:
    <textarea type="text" name="tresc" id="trescMaila">

    </textarea><br><br>
    </form>
    <button onclick="sendFunction()">wyślij</button>
  </div>

</body>


</html>
